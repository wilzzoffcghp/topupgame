<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaTop — Detail Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050810;--surface:#0d1220;--surface2:#131929;--border:rgba(99,179,255,0.12);
    --accent:#3b82f6;--accent2:#06b6d4;--gold:#f59e0b;--text:#e2e8f0;--muted:#64748b;
    --success:#10b981;--danger:#ef4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,0.12) 0%,transparent 70%);pointer-events:none;}
  nav{position:sticky;top:0;z-index:100;background:rgba(5,8,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .logo{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:2px;color:#fff;text-decoration:none;}
  .logo span{color:var(--accent);}
  .nav-links{display:flex;align-items:center;gap:8px;}
  .nav-link{color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:8px;font-size:.875rem;font-weight:500;transition:all .2s;}
  .nav-link:hover{color:var(--text);background:var(--surface);}
  .nav-btn{background:var(--accent);color:#fff;padding:7px 16px;border-radius:8px;font-size:.875rem;font-weight:600;text-decoration:none;transition:all .2s;border:none;cursor:pointer;}
  .nav-btn:hover{background:#2563eb;}
  .nav-btn.outline{background:transparent;border:1px solid var(--border);color:var(--text);}
  .user-info{display:none;align-items:center;gap:12px;}
  .balance-badge{background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:.8rem;}
  .balance-badge span{color:var(--gold);font-weight:600;}

  .container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:32px 24px 80px;}
  .back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:.875rem;margin-bottom:28px;transition:color .2s;}
  .back-btn:hover{color:var(--text);}

  /* Game header */
  .game-header{display:flex;gap:20px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:32px;}
  .game-icon{width:80px;height:80px;border-radius:16px;object-fit:cover;background:var(--surface2);flex-shrink:0;}
  .game-icon-fallback{width:80px;height:80px;border-radius:16px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0;}
  .game-info h1{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:4px;}
  .game-info p{color:var(--muted);font-size:.875rem;}
  .game-badge{display:inline-block;background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:var(--accent2);padding:3px 10px;border-radius:20px;font-size:.75rem;margin-top:6px;text-transform:capitalize;}

  /* Form fields */
  .form-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;}
  .form-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:.8rem;font-weight:500;color:var(--muted);}
  input[type=text],input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.95rem;outline:none;width:100%;transition:border-color .2s;}
  input:focus{border-color:var(--accent);}
  input::placeholder{color:var(--muted);}

  /* Products */
  .products-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px;}
  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
  .product-card{background:var(--surface2);border:2px solid var(--border);border-radius:14px;padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
  .product-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(6,182,212,0.05));opacity:0;transition:opacity .2s;}
  .product-card:hover::before,.product-card.selected::before{opacity:1;}
  .product-card:hover,.product-card.selected{border-color:var(--accent);transform:translateY(-2px);}
  .product-card.selected{border-color:var(--accent);box-shadow:0 0 20px rgba(59,130,246,0.25);}
  .product-name{font-weight:600;font-size:.875rem;margin-bottom:4px;line-height:1.3;}
  .product-desc{font-size:.75rem;color:var(--muted);margin-bottom:10px;line-height:1.4;}
  .product-price{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold);}
  .check-icon{position:absolute;top:10px;right:10px;width:20px;height:20px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.65rem;}
  .product-card.selected .check-icon{display:flex;}

  /* Confirm bar */
  .confirm-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(5,8,16,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:16px 24px;display:none;align-items:center;justify-content:space-between;gap:16px;}
  .confirm-bar.show{display:flex;}
  .confirm-info .label{font-size:.75rem;color:var(--muted);}
  .confirm-info .val{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;}
  .confirm-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:.95rem;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .confirm-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,0.4);}

  .skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:14px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skeleton-prod{height:110px;}

  .toast{position:fixed;bottom:90px;right:24px;z-index:999;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:.875rem;transform:translateX(120%);transition:transform .3s;max-width:280px;}
  .toast.show{transform:none;}
  .toast.error{border-color:var(--danger);color:var(--danger);}

  @media(max-width:600px){
    .game-header{flex-direction:column;text-align:center;}
    .form-row{grid-template-columns:1fr;}
    .products-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">NEXA<span>TOP</span></a>
  <div class="nav-links" id="navGuest">
    <a href="/login" class="nav-link">Masuk</a>
    <a href="/register" class="nav-btn">Daftar</a>
  </div>
  <div class="user-info" id="navUser">
    <div class="balance-badge">Saldo: <span id="navBalance">Rp0</span></div>
    <a href="/deposit" class="nav-link">+ Deposit</a>
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <button class="nav-btn outline" onclick="logout()">Keluar</button>
  </div>
</nav>

<div class="container">
  <a href="/" class="back-btn">
    ← Kembali ke Daftar Game
  </a>

  <div class="game-header" id="gameHeader">
    <div class="skeleton" style="width:80px;height:80px;border-radius:16px;flex-shrink:0;"></div>
    <div style="flex:1">
      <div class="skeleton" style="height:28px;width:60%;margin-bottom:8px;border-radius:8px;"></div>
      <div class="skeleton" style="height:16px;width:40%;border-radius:8px;"></div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-title">🎮 Data Akun Game</div>
    <div class="form-row" id="formFields">
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="inputTarget" placeholder="Masukkan User ID">
      </div>
    </div>
  </div>

  <div class="products-title" id="productsTitle">Pilih Nominal</div>
  <div class="products-grid" id="productsGrid">
    <div class="skeleton skeleton-prod"></div>
    <div class="skeleton skeleton-prod"></div>
    <div class="skeleton skeleton-prod"></div>
    <div class="skeleton skeleton-prod"></div>
    <div class="skeleton skeleton-prod"></div>
    <div class="skeleton skeleton-prod"></div>
  </div>
</div>

<!-- Confirm Bar -->
<div class="confirm-bar" id="confirmBar">
  <div style="display:flex;gap:24px;">
    <div class="confirm-info">
      <div class="label">Produk</div>
      <div class="val" id="cbProduct">—</div>
    </div>
    <div class="confirm-info">
      <div class="label">Total</div>
      <div class="val" style="color:var(--gold)" id="cbPrice">—</div>
    </div>
  </div>
  <button class="confirm-btn" onclick="goOrder()">LANJUT ORDER →</button>
</div>

<div class="toast" id="toast"></div>

<script>
const slug = location.pathname.split('/game/')[1]?.replace(/\/$/, '');
let selectedProduct = null;
let gameData = null;
let needZone = false;

// Detect games that need zone
const zoneGames = ['mobile-legends', 'arena-of-valor', 'clash-of-clans', 'lords-mobile'];

async function loadGame() {
  try {
    const r = await fetch(`/api/games/${slug}/detail`);
    const data = await r.json();
    if (!data.success) throw new Error();
    gameData = data.data;
    renderHeader(data.data);
    renderForm(data.data);
    renderProducts(data.data.products);
  } catch {
    showToast('Gagal memuat detail game', 'error');
  }
}

function renderHeader(game) {
  const el = document.getElementById('gameHeader');
  el.innerHTML = `
    ${game.icon_url
      ? `<img class="game-icon" src="${game.icon_url}" alt="${game.game_name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="game-icon-fallback" style="display:none">🎮</div>`
      : `<div class="game-icon-fallback">🎮</div>`}
    <div class="game-info">
      <h1>${game.game_name}</h1>
      <p>${game.products?.length || 0} pilihan nominal tersedia</p>
      <span class="game-badge">${game.category}</span>
    </div>
  `;
}

function renderForm(game) {
  needZone = zoneGames.includes(slug);
  if (needZone) {
    document.getElementById('formFields').innerHTML = `
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="inputTarget" placeholder="Masukkan User ID">
      </div>
      <div class="form-group">
        <label>Zone ID / Server</label>
        <input type="text" id="inputZone" placeholder="Masukkan Zone ID">
      </div>
    `;
  }
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  document.getElementById('productsTitle').textContent = `${products.length} Pilihan Nominal`;
  grid.innerHTML = products.map((p, i) => `
    <div class="product-card" onclick="selectProduct(this, ${JSON.stringify(p).replace(/"/g,'&quot;')})" style="animation-delay:${i*.03}s">
      <div class="check-icon">✓</div>
      <div class="product-name">${p.product_name}</div>
      ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
      <div class="product-price">${formatRp(p.price)}</div>
    </div>
  `).join('');
}

function selectProduct(el, product) {
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedProduct = product;
  document.getElementById('cbProduct').textContent = product.product_name;
  document.getElementById('cbPrice').textContent = formatRp(product.price);
  document.getElementById('confirmBar').classList.add('show');
}

function goOrder() {
  const target = document.getElementById('inputTarget')?.value?.trim();
  const zone = document.getElementById('inputZone')?.value?.trim();
  if (!target) { showToast('Masukkan User ID terlebih dahulu', 'error'); return; }
  if (needZone && !zone) { showToast('Masukkan Zone ID terlebih dahulu', 'error'); return; }
  if (!selectedProduct) { showToast('Pilih nominal terlebih dahulu', 'error'); return; }

  const token = localStorage.getItem('token');
  if (!token) {
    showToast('Login terlebih dahulu untuk melakukan order', 'error');
    setTimeout(() => location.href = '/login?redirect=' + encodeURIComponent(location.href), 1500);
    return;
  }

  const params = new URLSearchParams({
    slug,
    code: selectedProduct.product_code,
    target,
    price: selectedProduct.price,
    name: selectedProduct.product_name
  });
  if (zone) params.set('zone', zone);
  location.href = '/order?' + params.toString();
}

function formatRp(n) { return 'Rp' + Number(n).toLocaleString('id-ID'); }
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function checkAuth() {
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || 'null');
  if (token && user) {
    document.getElementById('navGuest').style.display = 'none';
    document.getElementById('navUser').style.display = 'flex';
    document.getElementById('navBalance').textContent = formatRp(user.balance || 0);
  }
}
function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); location.href = '/'; }

checkAuth();
loadGame();
</script>
</body>
</html>
